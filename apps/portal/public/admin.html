<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Usuários</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f8; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 1rem; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #ff521d; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #6b7280; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 16px; max-width: 500px; width: 90%; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
        input, select { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 8px; }
        .checkbox { display: flex; align-items: center; gap: 0.5rem; }
        .checkbox input { width: auto; }
        .actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
        .logout { float: right; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Gerenciar Usuários</h1>
            <button class="btn btn-secondary logout" onclick="logout()">Sair</button>
        </div>
        <button class="btn btn-primary" onclick="openModal()">Novo Usuário</button>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Nome</th>
                    <th>Admin</th>
                    <th>Ativo</th>
                    <th>Setor</th>
                    <th>Apps</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

    <!-- Modal de criação/edição -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <h2 id="modalTitle">Novo Usuário</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Senha <small>(deixe em branco para não alterar na edição)</small></label>
                    <input type="text" id="password">
                </div>
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="is_admin"> <label>Administrador</label>
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="is_active" checked> <label>Ativo</label>
                </div>
                <div class="form-group">
                    <label>Setor</label>
                    <input type="text" id="sector">
                </div>
                <div class="form-group">
                    <label>Apps (separados por vírgula)</label>
                    <input type="text" id="apps" value="precos">
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
